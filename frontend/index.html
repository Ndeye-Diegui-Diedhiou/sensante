<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SenSante - Pré-diagnostic</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
        body { font-family: 'Nunito', sans-serif; }
        .bar-animate { transition: width 0.7s cubic-bezier(.4,0,.2,1); }
        .fade-in { animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Header -->
    <header class="bg-blue-600 text-white py-4 shadow-lg">
        <div class="max-w-4xl mx-auto px-4">
            <h1 class="text-2xl font-bold">SenSante</h1>
            <p class="text-blue-100 text-sm">Assistant pré-diagnostic médical</p>
        </div>
    </header>

    <!-- Contenu principal -->
    <main class="max-w-4xl mx-auto px-4 py-8">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <!-- Colonne gauche : Formulaire -->
            <div id="form-section" class="bg-white rounded-xl shadow-md p-6">
                <h2 class="text-xl font-bold text-gray-800 mb-4">Symptômes du patient</h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Âge</label>
                        <input type="number" id="age" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="Ex: 28">
                    </div>

                    <div>
                        <label for="sexe" class="block text-sm font-medium text-gray-700 mb-1">Sexe</label>
                        <select id="sexe" title="Sexe" class="w-full border border-gray-300 rounded-lg p-2">
                            <option value="F">Féminin</option>
                            <option value="M">Masculin</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Température (°C)</label>
                        <input type="number" id="temperature" step="0.1" class="w-full border border-gray-300 rounded-lg p-2" placeholder="Ex: 38.5">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Tension systolique</label>
                        <input type="number" id="tension_sys" class="w-full border border-gray-300 rounded-lg p-2" placeholder="Ex: 120">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Symptômes</label>
                        <div class="space-y-2">
                            <label class="flex items-center"><input type="checkbox" id="toux" class="mr-2"> Toux</label>
                            <label class="flex items-center"><input type="checkbox" id="fatigue" class="mr-2"> Fatigue</label>
                            <label class="flex items-center"><input type="checkbox" id="maux_tete" class="mr-2"> Maux de tête</label>
                        </div>
                    </div>

                    <div>
                        <label for="region" class="block text-sm font-medium text-gray-700 mb-1">Région</label>
                        <select id="region" class="w-full border border-gray-300 rounded-lg p-2">
                            <option value="Dakar">Dakar</option>
                            <option value="Kolda">Kolda</option>
                            <option value="Saint-Louis">Saint-Louis</option>
                            <option value="Ziguinchor">Ziguinchor</option>
                        </select>
                    </div>

                    <button onclick="diagnostiquer()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition shadow-md">
                        Diagnostiquer
                    </button>
                </div>
            </div>

            <!-- Colonne droite : Résultat -->
            <div id="result-section">
                <div class="bg-white rounded-xl shadow-md p-6 text-center text-gray-400">
                    <p class="text-4xl mb-3">🩺</p>
                    <p class="font-medium">Remplissez le formulaire</p>
                    <p class="text-sm mt-1">puis cliquez sur Diagnostiquer</p>
                </div>
            </div>
        </div>

        <!-- Section Historique (Exercice 2) -->
        <div id="historique-section" class="mt-8 bg-white rounded-xl shadow-md p-6">
            <h3 class="text-lg font-bold text-gray-800 mb-4">5 Dernières Consultations</h3>
            <div id="historique-liste" class="space-y-3">
                <p class="text-gray-400 text-sm italic">Aucune consultation pour le moment.</p>
            </div>
        </div>
    </main>

    <footer class="text-center text-gray-400 text-sm py-8">
        SenSante v0.3 - ESP/UCAD - L2 GLSI 2026
    </footer>

    <!-- JavaScript -->
    <script>
        const API_URL = "http://localhost:8000";
        const historique = [];

        async function diagnostiquer() {
            // 1. Récupérer les données
            const patient = {
                age: parseInt(document.getElementById("age").value),
                sexe: document.getElementById("sexe").value,
                temperature: parseFloat(document.getElementById("temperature").value),
                tension_sys: parseInt(document.getElementById("tension_sys").value),
                toux: document.getElementById("toux").checked,
                fatigue: document.getElementById("fatigue").checked,
                maux_tete: document.getElementById("maux_tete").checked,
                region: document.getElementById("region").value
            };

            // 2. Validation simple
            if (!patient.age || isNaN(patient.temperature) || !patient.tension_sys) {
                afficherErreur("Veuillez remplir tous les champs obligatoires.");
                return;
            }

            afficherChargement();

            try {
                // 3. Appel API
                const response = await fetch(`${API_URL}/predict`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(patient)
                });

                if (!response.ok) throw new Error("Erreur serveur");

                const resultat = await response.json();
                
                // 4. Affichage et Historique
                afficherResultat(resultat);
                mettreAJourHistorique(resultat);

            } catch (error) {
                afficherErreur("Connexion impossible à l'API : " + error.message);
            }
        }

        function afficherChargement() {
            document.getElementById("result-section").innerHTML = `
                <div class="bg-white rounded-xl shadow-md p-6 text-center">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"></div>
                    <p class="text-gray-500">Analyse en cours...</p>
                </div>`;
        }

        function afficherResultat(r) {
            const couleurs = {
                palu: { bg: "bg-red-100", text: "text-red-800", bar: "bg-red-500", emoji: "🌡️" },
                grippe: { bg: "bg-orange-100", text: "text-orange-800", bar: "bg-orange-500", emoji: "❄️" },
                typh: { bg: "bg-yellow-100", text: "text-yellow-800", bar: "bg-yellow-500", emoji: "⚠️" },
                sain: { bg: "bg-green-100", text: "text-green-800", bar: "bg-green-500", emoji: "✅" }
            };

            const c = couleurs[r.diagnostic] || couleurs["sain"];
            const pct = Math.round(r.probabilite * 100);

            document.getElementById("result-section").innerHTML = `
                <div class="bg-white rounded-xl shadow-md p-6 fade-in">
                    <h2 class="text-xl font-bold text-gray-800 mb-4">Résultat</h2>
                    <div class="${c.bg} rounded-lg p-4 mb-4">
                        <p class="text-sm text-gray-600 uppercase font-bold">Diagnostic :</p>
                        <p class="text-2xl font-bold ${c.text} mt-1">${c.emoji} ${r.diagnostic.toUpperCase()}</p>
                    </div>
                    <div class="mb-4">
                        <div class="flex justify-between mb-1">
                            <span class="text-sm text-gray-600">Probabilité</span>
                            <span class="text-sm font-bold ${c.text}">${pct}%</span>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-3">
                            <div class="${c.bar} h-3 rounded-full bar-animate" style="width: ${pct}%"></div>
                        </div>
                    </div>
                    <p class="text-sm text-gray-700 bg-gray-50 p-3 rounded border-l-4 border-blue-500">${r.message}</p>
                </div>`;
                demanderExplication(r);
        }

        /**
 * Affiche le diagnostic initial et lance la demande d'explication IA.
}

/**
 * Envoie les données au backend FastAPI pour obtenir une explication simplifiée.
 */
async function demanderExplication(diagnostic_data) {
    // 1. Récupération et formatage des données (attention à la casse "sexe")
    const explainData = {
        diagnostic: diagnostic_data.diagnostic,
        probabilite: diagnostic_data.probabilite,
        age: parseInt(document.getElementById("age").value),
        sexe: document.getElementById("sexe").value.trim(), // Correspond au modèle Pydantic
        temperature: parseFloat(document.getElementById("temperature").value),
        region: document.getElementById("region").value
    };

    // 2. Préparation de l'interface (Zone d'affichage)
    const section = document.getElementById("result-section");
    const container = section.querySelector(".bg-white");
    
    // Supprimer une ancienne explication si elle existe
    const ancienneZone = document.getElementById("explication-zone");
    if (ancienneZone) ancienneZone.remove();

    const explDiv = document.createElement("div");
    explDiv.id = "explication-zone";
    explDiv.innerHTML = `
        <div class="mt-4 bg-purple-50 rounded-lg p-4 border border-purple-200">
            <p class="text-sm text-purple-600 font-medium mb-2">Explication (Llama 3)</p>
            <p class="text-gray-500 text-sm animate-pulse">Génération en cours...</p>
        </div>
    `;
    container.appendChild(explDiv);

    // 3. Appel API
    try {
        const response = await fetch(API_URL + "/explain", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(explainData)
        });

        if (response.ok) {
            const result = await response.json();
            explDiv.innerHTML = `
                <div class="mt-4 bg-purple-50 rounded-lg p-4 border border-purple-200">
                    <p class="text-sm text-purple-600 font-medium mb-2">Explication (Llama 3)</p>
                    <p class="text-gray-700 text-sm leading-relaxed">${result.explication}</p>
                </div>
            `;
        } else {
            throw new Error("Erreur serveur");
        }
    } catch (error) {
        console.error("Erreur d'explication:", error);
        explDiv.innerHTML = `
            <div class="mt-4 bg-gray-50 rounded-lg p-3">
                <p class="text-gray-400 text-sm italic">L'explication n'est pas disponible pour le moment.</p>
            </div>
        `;
    }
}

        function mettreAJourHistorique(r) {
            const entree = {
                diag: r.diagnostic,
                prob: Math.round(r.probabilite * 100),
                heure: new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' })
            };
            
            historique.unshift(entree);
            if (historique.length > 5) historique.pop();

            document.getElementById("historique-liste").innerHTML = historique.map(h => `
                <div class="flex justify-between items-center border-b border-gray-100 pb-2">
                    <div>
                        <span class="font-bold text-blue-600 uppercase text-xs">${h.diag}</span>
                        <span class="text-xs text-gray-400 ml-2">${h.heure}</span>
                    </div>
                    <span class="text-sm font-mono">${h.prob}%</span>
                </div>
            `).join('');
        }

        function afficherErreur(msg) {
            document.getElementById("result-section").innerHTML = `
                <div class="bg-red-50 border border-red-200 rounded-xl p-6 text-red-700">
                    <p class="font-bold">Erreur</p>
                    <p class="text-sm">${msg}</p>
                </div>`;
        }
    </script>
</body>
</html>
